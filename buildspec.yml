version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-northeast-2
    AWS_ACCOUNT_ID: "086015456585"
    IMAGE_REPO_NAME: "nodejs-test"
    INSTANCE_TYPE: "t3.micro"
    KEY_NAME: "java-be-server"
    TG_NAME: "react-app-tg"
    ALB_NAME: "react-app-alb"
    ASG_NAME: "react-app-asg"
    TEMPLATE_NAME: "react-app-template"
    EXISTING_VPC_ID: "vpc-08ab699fb2026cce6"
    EXISTING_SUBNET1: "subnet-0d181098264f54fe3"
    EXISTING_SUBNET2: "subnet-036f8e21d5c51f265"
    EXISTING_SG_ID: "sg-0fd3a407e411c90fd"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - set -e
      - apt-get update -y
      - apt-get install -y git unzip curl jq

  pre_build:
    commands:
      - set -e
      - export VPC_ID=$EXISTING_VPC_ID
      - export SUBNET1=$EXISTING_SUBNET1
      - export SUBNET2=$EXISTING_SUBNET2
      - export SG_ID=$EXISTING_SG_ID
      - export SUBNETS="$SUBNET1,$SUBNET2"
      - export CLONE_URL="https://$GITHUB_TOKEN@github.com/edumgt/egov-react-nuclear.git"
      - git clone $CLONE_URL
      - export REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME"
      - export IMAGE_TAG=latest
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - set -e
      - cp -r egov-react-nuclear/build app-dist
      - echo "OK" > app-dist/health.html

  post_build:
    commands:
      - set -e
      - printf "FROM nginx:alpine\nCOPY ./app-dist /usr/share/nginx/html\nCOPY nginx.conf /etc/nginx/nginx.conf\n" > Dockerfile
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo '#!/bin/bash\nyum update -y\namazon-linux-extras install docker -y\nservice docker start\naws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI\ndocker pull $REPOSITORY_URI:$IMAGE_TAG\ndocker run -d -p 80:80 $REPOSITORY_URI:$IMAGE_TAG' > user-data.sh
      - USER_DATA_B64=$(base64 user-data.sh | tr -d '\n')
      - INSTANCE_ID=$(aws ec2 run-instances --image-id ami-01b15011585ebc739 --count 1 --instance-type $INSTANCE_TYPE --key-name $KEY_NAME --security-group-ids $SG_ID --subnet-id $SUBNET1 --user-data "$USER_DATA_B64" --query 'Instances[0].InstanceId' --output text)
      - aws ec2 wait instance-running --instance-ids $INSTANCE_ID
      - sleep 30
      - AMI_ID=$(aws ec2 create-image --instance-id $INSTANCE_ID --name "nginx-react-app-ami-$(date +%s)" --no-reboot --query 'ImageId' --output text)
      - TEMPLATE_ID=$(aws ec2 describe-launch-templates --launch-template-names $TEMPLATE_NAME --query "LaunchTemplates[0].LaunchTemplateId" --output text 2>/dev/null); if [ "$TEMPLATE_ID" != "None" ] && [ "$TEMPLATE_ID" != "null" ]; then aws ec2 delete-launch-template --launch-template-id $TEMPLATE_ID; sleep 5; fi
      - aws ec2 create-launch-template --launch-template-name $TEMPLATE_NAME --version-description "v1" --launch-template-data "{\"ImageId\":\"$AMI_ID\",\"InstanceType\":\"$INSTANCE_TYPE\",\"KeyName\":\"$KEY_NAME\",\"SecurityGroupIds\":[\"$SG_ID\"]}"
      - TG_EXISTS=$(aws elbv2 describe-target-groups --names "$TG_NAME" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null); if [ "$TG_EXISTS" != "None" ] && [ "$TG_EXISTS" != "null" ]; then ALB_ARN=$(aws elbv2 describe-load-balancers --names "$ALB_NAME" --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null); LISTENER_ARNS=$(aws elbv2 describe-listeners --load-balancer-arn $ALB_ARN --query 'Listeners[*].ListenerArn' --output text); for L in $LISTENER_ARNS; do RULE_ARNS=$(aws elbv2 describe-rules --listener-arn $L --query 'Rules[*].RuleArn' --output text); for R in $RULE_ARNS; do TG_REF=$(aws elbv2 describe-rules --listener-arn $L --query "Rules[?RuleArn=='$R'] | [?Actions[?TargetGroupArn=='$TG_EXISTS']]" --output text); if [ "$TG_REF" != "" ]; then aws elbv2 delete-rule --rule-arn $R; fi; done; DEFAULT_TG=$(aws elbv2 describe-listeners --listener-arn $L --query 'Listeners[0].DefaultActions[0].TargetGroupArn' --output text); if [ "$DEFAULT_TG" = "$TG_EXISTS" ]; then aws elbv2 delete-listener --listener-arn $L; sleep 5; fi; done; aws elbv2 delete-target-group --target-group-arn $TG_EXISTS; sleep 5; fi
      - TG_ARN=$(aws elbv2 create-target-group --name $TG_NAME --protocol HTTP --port 80 --target-type instance --vpc-id $VPC_ID --query 'TargetGroups[0].TargetGroupArn' --output text)
      - ALB_EXISTS=$(aws elbv2 describe-load-balancers --names "$ALB_NAME" --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null); if [ "$ALB_EXISTS" != "None" ] && [ "$ALB_EXISTS" != "null" ]; then aws elbv2 delete-load-balancer --load-balancer-arn $ALB_EXISTS; sleep 30; fi
      - ALB_ARN=$(aws elbv2 create-load-balancer --name $ALB_NAME --subnets $SUBNET1 $SUBNET2 --security-groups $SG_ID --query 'LoadBalancers[0].LoadBalancerArn' --output text)
      - aws elbv2 create-listener --load-balancer-arn $ALB_ARN --protocol HTTP --port 80 --default-actions Type=forward,TargetGroupArn=$TG_ARN
      - ASG_EXISTS=$(aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names "$ASG_NAME" --query 'AutoScalingGroups[0].AutoScalingGroupName' --output text 2>/dev/null); if [ "$ASG_EXISTS" != "None" ] && [ "$ASG_EXISTS" != "null" ]; then aws autoscaling delete-auto-scaling-group --auto-scaling-group-name $ASG_NAME --force-delete; sleep 30; fi
      - aws autoscaling create-auto-scaling-group --auto-scaling-group-name $ASG_NAME --launch-template LaunchTemplateName=$TEMPLATE_NAME,Version=1 --min-size 2 --max-size 2 --desired-capacity 2 --vpc-zone-identifier "$SUBNET1,$SUBNET2" --target-group-arns $TG_ARN

artifacts:
  files:
    - imagedefinitions.json