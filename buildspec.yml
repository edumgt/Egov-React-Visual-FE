version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-northeast-2
    AWS_ACCOUNT_ID: "086015456585"
    IMAGE_REPO_NAME: "nodejs-test"
    INSTANCE_TYPE: "t3.micro"
    KEY_NAME: "my-key"  # 사전에 생성된 EC2 키 페어
    TG_NAME: "react-app-tg"
    ALB_NAME: "react-app-alb"
    ASG_NAME: "react-app-asg"
    TEMPLATE_NAME: "react-app-template"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - apt-get update -y
      - apt-get install -y git unzip curl jq

  pre_build:
    commands:
      # 1. VPC 생성
      - VPC_ID=$(aws ec2 create-vpc --cidr-block 10.0.0.0/16 --query 'Vpc.VpcId' --output text)
      - aws ec2 modify-vpc-attribute --vpc-id $VPC_ID --enable-dns-support "{\"Value\":true}"
      - aws ec2 modify-vpc-attribute --vpc-id $VPC_ID --enable-dns-hostnames "{\"Value\":true}"

      # 2. Subnet 생성 (AZ a, c)
      - SUBNET1=$(aws ec2 create-subnet --vpc-id $VPC_ID --cidr-block 10.0.1.0/24 --availability-zone ap-northeast-2a --query 'Subnet.SubnetId' --output text)
      - SUBNET2=$(aws ec2 create-subnet --vpc-id $VPC_ID --cidr-block 10.0.2.0/24 --availability-zone ap-northeast-2c --query 'Subnet.SubnetId' --output text)
      - SUBNETS="$SUBNET1,$SUBNET2"

      # 3. IGW 및 라우팅
      - IGW_ID=$(aws ec2 create-internet-gateway --query 'InternetGateway.InternetGatewayId' --output text)
      - aws ec2 attach-internet-gateway --internet-gateway-id $IGW_ID --vpc-id $VPC_ID
      - RT_ID=$(aws ec2 create-route-table --vpc-id $VPC_ID --query 'RouteTable.RouteTableId' --output text)
      - aws ec2 create-route --route-table-id $RT_ID --destination-cidr-block 0.0.0.0/0 --gateway-id $IGW_ID
      - aws ec2 associate-route-table --subnet-id $SUBNET1 --route-table-id $RT_ID
      - aws ec2 associate-route-table --subnet-id $SUBNET2 --route-table-id $RT_ID

      # 4. 보안 그룹 생성 (HTTP 허용)
      - SG_ID=$(aws ec2 create-security-group --group-name react-app-sg --description "SG for React app" --vpc-id $VPC_ID --query 'GroupId' --output text)
      - aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 80 --cidr 0.0.0.0/0

      # 5. GitHub clone & Docker login
      - echo "🔐 GitHub Token prefix = $(echo $GITHUB_TOKEN | cut -c1-4)****"
      - CLONE_URL="https://$GITHUB_TOKEN@github.com/edumgt/egov-react-nuclear.git"
      - git clone $CLONE_URL
      - cd egov-react-nuclear
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - IMAGE_TAG=latest
      - echo "VPC_ID=$VPC_ID" >> ../variables.env
      - echo "SUBNETS=$SUBNETS" >> ../variables.env
      - echo "SG_ID=$SG_ID" >> ../variables.env
      - cd ..

  build:
    commands:
      - cd egov-react-nuclear
      - echo Build started on `date`
      - npm install
      - npm run build
      - cp -r build ../app-dist
      - cd ..

  post_build:
    commands:
      # Dockerfile 생성 및 빌드
      - |
        cat <<EOF > Dockerfile
        FROM nginx:alpine
        COPY ./app-dist /usr/share/nginx/html
        EOF
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      # EC2용 사용자 데이터 생성
      - |
        cat <<EOF > user-data.sh
        #!/bin/bash
        yum update -y
        amazon-linux-extras install docker -y
        service docker start
        aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
        docker pull $REPOSITORY_URI:$IMAGE_TAG
        docker run -d -p 80:80 $REPOSITORY_URI:$IMAGE_TAG
        EOF
      - USER_DATA_B64=$(base64 user-data.sh | tr -d '\n')

      # EC2 → AMI 생성
      - . variables.env
      - |
        INSTANCE_ID=$(aws ec2 run-instances \
          --image-id ami-05c13eab67c5d8861 \
          --count 1 \
          --instance-type $INSTANCE_TYPE \
          --key-name $KEY_NAME \
          --security-group-ids $SG_ID \
          --subnet-id $(echo $SUBNETS | cut -d',' -f1) \
          --user-data "$USER_DATA_B64" \
          --query 'Instances[0].InstanceId' --output text)
        echo "INSTANCE_ID=$INSTANCE_ID" >> variables.env
      - . variables.env
      - |
        AMI_ID=$(aws ec2 create-image \
          --instance-id $INSTANCE_ID \
          --name "nginx-react-app-ami-$(date +%s)" \
          --no-reboot \
          --query 'ImageId' --output text)
        echo "AMI_ID=$AMI_ID" >> variables.env

      # Launch Template 생성
      - |
        aws ec2 create-launch-template \
          --launch-template-name $TEMPLATE_NAME \
          --version-description "v1" \
          --launch-template-data "{
            \"ImageId\":\"$AMI_ID\",
            \"InstanceType\":\"$INSTANCE_TYPE\",
            \"KeyName\":\"$KEY_NAME\",
            \"SecurityGroupIds\":[\"$SG_ID\"]
          }"

      # Target Group + ALB + Listener
      - |
        TG_ARN=$(aws elbv2 create-target-group \
          --name $TG_NAME \
          --protocol HTTP \
          --port 80 \
          --target-type instance \
          --vpc-id $VPC_ID \
          --query 'TargetGroups[0].TargetGroupArn' --output text)
        echo "TG_ARN=$TG_ARN" >> variables.env

      - |
        ALB_ARN=$(aws elbv2 create-load-balancer \
          --name $ALB_NAME \
          --subnets $(echo $SUBNETS | tr ',' ' ') \
          --security-groups $SG_ID \
          --query 'LoadBalancers[0].LoadBalancerArn' --output text)
        echo "ALB_ARN=$ALB_ARN" >> variables.env

      - . variables.env
      - |
        aws elbv2 create-listener \
          --load-balancer-arn $ALB_ARN \
          --protocol HTTP \
          --port 80 \
          --default-actions Type=forward,TargetGroupArn=$TG_ARN

      # Auto Scaling Group 구성
      - |
        aws autoscaling create-auto-scaling-group \
          --auto-scaling-group-name $ASG_NAME \
          --launch-template LaunchTemplateName=$TEMPLATE_NAME,Version=1 \
          --min-size 2 \
          --max-size 2 \
          --desired-capacity 2 \
          --vpc-zone-identifier "$SUBNETS" \
          --target-group-arns $TG_ARN

artifacts:
  files:
    - imagedefinitions.json
