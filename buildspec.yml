version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-northeast-2
    AWS_ACCOUNT_ID: "086015456585"
    IMAGE_REPO_NAME: "nodejs-test"
    INSTANCE_TYPE: "t3.micro"
    KEY_NAME: "java-be-server"
    TG_NAME: "react-app-tg"
    ALB_NAME: "react-app-alb"
    ASG_NAME: "react-app-asg"
    TEMPLATE_NAME: "react-app-template"
    EXISTING_VPC_ID: "vpc-08ab699fb2026cce6"
    EXISTING_SUBNET1: "subnet-0d181098264f54fe3"
    EXISTING_SUBNET2: "subnet-036f8e21d5c51f265"
    EXISTING_SG_ID: "sg-0fd3a407e411c90fd"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - set -e
      - apt-get update -y
      - apt-get install -y git unzip curl jq

  pre_build:
    commands:
      - set -e
      - echo "Ō£ģ ļ”¼ņåīņŖż ID ļĪ£ļō£"
      - export VPC_ID=$EXISTING_VPC_ID
      - export SUBNET1=$EXISTING_SUBNET1
      - export SUBNET2=$EXISTING_SUBNET2
      - export SG_ID=$EXISTING_SG_ID
      - export SUBNETS="$SUBNET1,$SUBNET2"
      - echo "­¤öÉ GitHub Token prefix: $(echo $GITHUB_TOKEN | cut -c1-4)****"
      - export CLONE_URL="https://$GITHUB_TOKEN@github.com/edumgt/egov-react-nuclear.git"
      - git clone $CLONE_URL
      - cd egov-react-nuclear
      - export REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME"
      - export IMAGE_TAG=latest
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
      - cd ..

  build:
    commands:
      - set -e
      - cd egov-react-nuclear
      - npm install
      - npm run build
      - cp -r build ../app-dist
      - cd ..

  post_build:
    commands:
      - set -e
      - echo -e "FROM nginx:alpine\nCOPY ./app-dist /usr/share/nginx/html" > Dockerfile
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - |
        echo '#!/bin/bash
        yum update -y
        amazon-linux-extras install docker -y
        service docker start
        aws ecr get-login-password --region '"$AWS_DEFAULT_REGION"' | docker login --username AWS --password-stdin '"$REPOSITORY_URI"'
        docker pull '"$REPOSITORY_URI:$IMAGE_TAG"'
        docker run -d -p 80:80 '"$REPOSITORY_URI:$IMAGE_TAG"'' > user-data.sh
      - USER_DATA_B64=$(base64 user-data.sh | tr -d '\n')
      - INSTANCE_ID=$(aws ec2 run-instances --image-id ami-01b15011585ebc739 --count 1 --instance-type $INSTANCE_TYPE --key-name $KEY_NAME --security-group-ids $SG_ID --subnet-id $SUBNET1 --user-data "$USER_DATA_B64" --query 'Instances[0].InstanceId' --output text)
      - aws ec2 wait instance-running --instance-ids $INSTANCE_ID
      - sleep 30
      - AMI_ID=$(aws ec2 create-image --instance-id $INSTANCE_ID --name "nginx-react-app-ami-$(date +%s)" --no-reboot --query 'ImageId' --output text)
      - aws ec2 create-launch-template --launch-template-name $TEMPLATE_NAME --version-description "v1" --launch-template-data "{\"ImageId\":\"$AMI_ID\",\"InstanceType\":\"$INSTANCE_TYPE\",\"KeyName\":\"$KEY_NAME\",\"SecurityGroupIds\":[\"$SG_ID\"]}"
      - TG_ARN=$(aws elbv2 create-target-group --name $TG_NAME --protocol HTTP --port 80 --target-type instance --vpc-id $VPC_ID --query 'TargetGroups[0].TargetGroupArn' --output text)
      - ALB_ARN=$(aws elbv2 create-load-balancer --name $ALB_NAME --subnets $SUBNET1 $SUBNET2 --security-groups $SG_ID --query 'LoadBalancers[0].LoadBalancerArn' --output text)
      - aws elbv2 create-listener --load-balancer-arn $ALB_ARN --protocol HTTP --port 80 --default-actions Type=forward,TargetGroupArn=$TG_ARN
      - aws autoscaling create-auto-scaling-group --auto-scaling-group-name $ASG_NAME --launch-template LaunchTemplateName=$TEMPLATE_NAME,Version=1 --min-size 2 --max-size 2 --desired-capacity 2 --vpc-zone-identifier "$SUBNET1,$SUBNET2" --target-group-arns $TG_ARN

artifacts:
  files:
    - imagedefinitions.json
